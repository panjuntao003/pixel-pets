<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <g shape-rendering="crispEdges">
    <!-- Outline -->
    <rect x="6" y="10" width="20" height="16" fill="#000"/>
    <rect x="4" y="12" width="24" height="12" fill="#000"/>
    <!-- Ears Outline -->
    <rect x="8" y="6" width="4" height="4" fill="#000"/>
    <rect x="20" y="6" width="4" height="4" fill="#000"/>

    <!-- Orange Body -->
    <rect x="8" y="12" width="16" height="12" fill="#FB923C"/>
    <rect x="6" y="14" width="20" height="8" fill="#FB923C"/>
    
    <!-- White Face/Belly -->
    <rect x="10" y="16" width="12" height="8" fill="#FFF"/>
    <rect x="8" y="18" width="16" height="6" fill="#FFF"/>

    <!-- Ear Fill -->
    <rect x="10" y="8" width="2" height="2" fill="#FB923C"/>
    <rect x="20" y="8" width="2" height="2" fill="#FB923C"/>

    <!-- Eyes -->
    <rect x="10" y="18" width="2" height="2" fill="#000"/>
    <rect x="20" y="18" width="2" height="2" fill="#000"/>
    
    <!-- Nose -->
    <rect x="15" y="19" width="2" height="1" fill="#000"/>
    
    <!-- Blush -->
    <rect x="8" y="20" width="2" height="1" fill="#F87171"/>
    <rect x="22" y="20" width="2" height="1" fill="#F87171"/>

    <!-- Paws Outline -->
    <rect x="8" y="24" width="4" height="4" fill="#000"/>
    <rect x="20" y="24" width="4" height="4" fill="#000"/>
    <!-- Paws Fill -->
    <rect x="10" y="24" width="2" height="2" fill="#FFF"/>
    <rect x="20" y="24" width="2" height="2" fill="#FFF"/>
  </g>
</svg>