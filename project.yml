name: PixelPets
targets:
  PixelPets:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: PixelPets
    settings:
      INFOPLIST_FILE: PixelPets/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.pixelpets.app
      SWIFT_VERSION: "5.9"
  PixelPetsTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - PixelPetsTests
    dependencies:
      - target: PixelPets
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.pixelpets.app.tests
      SWIFT_VERSION: "5.9"
