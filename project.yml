name: Quota
targets:
  Quota:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Quota
    settings:
      INFOPLIST_FILE: Quota/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.quota.app
      SWIFT_VERSION: "5.9"
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGN_ENTITLEMENTS: Quota/Quota.entitlements
      ENABLE_HARDENED_RUNTIME: YES
  QuotaTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - QuotaTests
    dependencies:
      - target: Quota
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.quota.app.tests
      SWIFT_VERSION: "5.9"
